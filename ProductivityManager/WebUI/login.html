<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Productivity Manager – Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MAIN CARD */
        .login-card {
            width: 420px;
            background: #ffffff;
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

            .login-card h2 {
                margin: 0 0 10px 0;
                color: #1d2671;
                font-size: 28px;
            }

            .login-card p {
                color: #666;
                margin-bottom: 30px;
            }

        /* INPUTS */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                color: #444;
                font-weight: 600;
            }

            .form-group input {
                width: 100%;
                padding: 12px 14px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 15px;
                outline: none;
            }

                .form-group input:focus {
                    border-color: #1d2671;
                }

        /* BUTTON */
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

            .login-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            }

        /* SIGNUP LINK */
        .signup {
            margin-top: 18px;
            font-size: 14px;
            color: #555;
        }

            .signup a {
                color: #1d2671;
                font-weight: 600;
                text-decoration: none;
                cursor: pointer;
            }

                .signup a:hover {
                    text-decoration: underline;
                }

        /* MESSAGE */
        .message {
            margin-top: 20px;
            font-weight: 600;
            display: none;
        }

        .error {
            color: #c0392b;
        }

        .success {
            color: #27ae60;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .login-card {
                width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>Login to Productivity Manager</p>

        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter your username" />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" />
        </div>

        <button class="login-btn" onclick="login()">Login</button>

        
        <div class="signup">
            Not a user? <a id="signupLink" href="signup.html">Sign up</a>
        </div>

        <div id="message" class="message"></div>
    </div>

   
    <script>
        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            window.chrome.webview.postMessage({
                action: "login",
                username: username,
                password: password
            });
        }

        // Code Started for Sending Activity of User 2secs.


        let lastActivitySent = 0;
        const activityCooldown = 2000; // 2 seconds

        function sendActivity() {
            const now = Date.now();

            if (now - lastActivitySent < activityCooldown) {
                return;
            }

            lastActivitySent = now;

            chrome.webview.postMessage({
                action: "activity"
            });
        }

        document.addEventListener("mousemove", sendActivity);
        document.addEventListener("keydown", sendActivity);


        //Code Complete for Sending Activty of User...

        window.chrome.webview.addEventListener("message", event => {
            const msg = event.data;
            const messageBox = document.getElementById("message");

            if (msg.action === "loginFailed") {
                messageBox.textContent = msg.message;
                messageBox.className = "message error";
                messageBox.style.display = "block";
            }
            if (msg.action === "loginSuccess") {
                // Optional: small delay so user sees success
                messageBox.textContent = "Login successful. Redirecting...";
                messageBox.className = "message success";
                messageBox.style.display = "block";

                setTimeout(() => {
                    window.location.href = "home.html";
                }, 600);
            }

        });
    </script>

</body>
</html>
