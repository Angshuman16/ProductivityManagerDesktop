<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Productivity Manager – Sign Up</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARD */
        .signup-card {
            width: 440px;
            background: #ffffff;
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

            .signup-card h2 {
                margin: 0 0 10px 0;
                color: #1d2671;
                font-size: 28px;
            }

            .signup-card p {
                color: #666;
                margin-bottom: 30px;
            }

        /* FORM */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                color: #444;
                font-weight: 600;
            }

            .form-group input {
                width: 100%;
                padding: 12px 14px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 15px;
                outline: none;
            }

                .form-group input:focus {
                    border-color: #1d2671;
                }

        /* BUTTON */
        .signup-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

            .signup-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            }

        /* MESSAGE */
        .message {
            margin-top: 20px;
            font-weight: 600;
            display: none;
            text-align: center;
        }

        .error {
            color: #c0392b;
        }

        .success {
            color: #27ae60;
        }

        /* FOOTER LINKS */
        .footer {
            margin-top: 22px;
            font-size: 14px;
            color: #555;
        }

            .footer a {
                color: #1d2671;
                font-weight: 600;
                text-decoration: none;
                cursor: pointer;
            }

                .footer a:hover {
                    text-decoration: underline;
                }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .signup-card {
                width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="signup-card">
        <h2>Create Account</h2>
        <p>Join Productivity Manager and stay on track</p>

        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Choose a username" />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create a password" />
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" placeholder="Re-enter password" />
        </div>

        <button class="signup-btn" onclick="signup()">Register User</button>

        <div id="message" class="message"></div>

        <div class="footer">
            Already have an account? <a id="backToLogin" href="login.html">Login</a>
        </div>
    </div>

    <!-- ⚠️ LOGIC PLACEHOLDERS (NO DB YET) -->
    <script>
        function signup() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            const messageBox = document.getElementById("message");

            if (password !== confirmPassword) {
                messageBox.textContent = "Passwords do not match";
                messageBox.className = "message error";
                messageBox.style.display = "block";
                return;
            }

            window.chrome.webview.postMessage({
                action: "signup",
                username: username,
                password: password
            });
        }

        window.chrome.webview.addEventListener("message", event => {
            const msg = event.data;
            const messageBox = document.getElementById("message");

            if (msg.action === "signupFailed") {
                messageBox.textContent = msg.message;
                messageBox.className = "message error";
                messageBox.style.display = "block";
            }

            if (msg.action === "signupSuccess") {
                messageBox.textContent = msg.message;
                messageBox.className = "message success";
                messageBox.style.display = "block";
            }
        });
    </script>

</body>
</html>
